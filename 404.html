<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到页面 · Page Not Found — Job Offers Workshop</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.resources-body { display: flex; align-items: center; justify-content: center; }
    .four04 { max-width: 560px; padding: 48px 24px; text-align: center; }
    .four04 .code { font-size: 96px; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 12px; }
    .four04 h1 { font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif; font-size: 36px; color: var(--primary-dark); margin-bottom: 8px; }
    .four04 p { font-size: 18px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.5; }
    .four04 .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .four04 a { background: var(--primary); color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: background 200ms ease; }
    .four04 a:hover { background: var(--primary-dark); }
    .four04 a.ghost { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .four04 a.ghost:hover { background: var(--primary-light); }
  </style>
</head>
<body class="zh resources-body">
  <main class="four04">
    <div class="code">404</div>
    <h1><span class="zh">找不到页面</span><span class="en">Page Not Found</span></h1>
    <p>
      <span class="zh">您查找的页面不存在 — 可能链接已过时。</span>
      <span class="en">The page you're looking for doesn't exist — the link may be out of date.</span>
    </p>
    <div class="links">
      <a href="/"><span class="zh">返回幻灯片</span><span class="en">Back to Slides</span></a>
      <a class="ghost" href="/resources"><span class="zh">资源页面</span><span class="en">Resources</span></a>
    </div>
  </main>
  <script src="404.js"></script>
</body>
</html>
