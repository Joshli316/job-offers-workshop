<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<title>OG Image Source</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&display=swap">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", -apple-system, sans-serif;
    background: radial-gradient(ellipse at 65% 38%, #9333ea 0%, #7c3aed 55%, #5b21b6 100%);
    color: #fff;
    padding: 64px 80px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .briefcase {
    width: 56px; height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.14);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 12px;
  }
  .org-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.95;
  }
  .org-name .en {
    display: block;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    opacity: 0.75;
    margin-top: 2px;
  }
  .center {
    margin-top: 22px;
  }
  .workshop-tag {
    display: inline-block;
    background: #d97706;
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 4px;
    margin-bottom: 28px;
  }
  .title-zh {
    font-size: 124px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .title-en {
    font-size: 44px;
    font-weight: 500;
    line-height: 1.15;
    opacity: 0.92;
    margin-bottom: 28px;
  }
  .gold-rule {
    width: 96px;
    height: 6px;
    background: #d97706;
    border-radius: 3px;
    margin-bottom: 24px;
  }
  .subtitle {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.45;
    opacity: 0.88;
    max-width: 900px;
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .url {
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 18px;
    font-weight: 600;
    opacity: 0.78;
    letter-spacing: 0.02em;
  }
  .topics {
    font-size: 16px;
    font-weight: 600;
    opacity: 0.7;
    letter-spacing: 0.06em;
    text-align: right;
  }
</style>
</head>
<body>

<div class="top">
  <div class="briefcase">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/>
      <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
    </svg>
  </div>
  <div class="org-name">
    华埠服务中心
    <span class="en">Chinatown Service Center</span>
  </div>
</div>

<div class="center">
  <div class="workshop-tag">Workshop 9 · 就业系列</div>
  <div class="title-zh">看懂 Offer 与福利</div>
  <div class="title-en">Job Offers &amp; Benefits Workshop</div>
  <div class="gold-rule"></div>
  <div class="subtitle">读懂录用信 · 工资计算 · 401k · 医保 · W-4 · 谈判</div>
</div>

<div class="bottom">
  <div class="url">job-offers-workshop.pages.dev</div>
  <div class="topics">免费 · 双语 · 无需移民身份</div>
</div>

</body>
</html>
